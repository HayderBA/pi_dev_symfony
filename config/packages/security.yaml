security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                username_parameter: _username
                password_parameter: _password
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
                default_target_path: after_login
                enable_csrf: true
                always_use_default_target_path: true
            two_factor:
                auth_form_path: 2fa_login
                check_path: 2fa_login_check
                post_only: true
                default_target_path: after_login
                prepare_on_login: true
                prepare_on_access_denied: true
                always_use_default_target_path: true
                auth_code_parameter_name: _auth_code
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/mental-health, roles: ROLE_PATIENT }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/reinitialiser, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/2fa/setup, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/after-login, roles: IS_AUTHENTICATED_REMEMBERED }
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/face, roles: ROLE_ADMIN }
        - { path: ^/admin, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/back/bien-etre, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/profile, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
