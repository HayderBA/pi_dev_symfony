# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    uploads_directory: '%kernel.project_dir%/public/uploads'
    pdf_directory: '%kernel.project_dir%/public/uploads/pdfs'
    app.bad_words_file: '%kernel.project_dir%/config/badwords.json'
    cloudinary.cloud_name: '%env(CLOUDINARY_CLOUD_NAME)%'
    cloudinary.api_key: '%env(CLOUDINARY_API_KEY)%'
    cloudinary.api_secret: '%env(CLOUDINARY_API_SECRET)%'
    cloudinary.upload_preset: '%env(CLOUDINARY_UPLOAD_PRESET)%'
    gemini.api_key: '%env(GEMINI_API_KEY)%'
    app.face_api_key: '%env(FACE_API_KEY)%'
    app.face_api_secret: '%env(FACE_API_SECRET)%'
    app.groq_api_key: '%env(GROQ_API_KEY)%'
    mailer.from_email: '%env(MAILER_FROM_EMAIL)%'
    mailer.from_name: '%env(MAILER_FROM_NAME)%'
    mailer.notify_email: '%env(MAILER_NOTIFY_EMAIL)%'
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\GeminiService:
        arguments:
            $apiKey: '%gemini.api_key%'

    App\Service\MailerService:
        arguments:
            $fromEmail:    '%mailer.from_email%'
            $fromName:     '%mailer.from_name%'
            $notifyEmail:  '%mailer.notify_email%'

    App\Service\BadWordFilter:
        arguments:
            $badWordsFile: '%app.bad_words_file%'

    App\Command\BadWordsCommand:
        arguments:
            $badWordsFile: '%app.bad_words_file%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
